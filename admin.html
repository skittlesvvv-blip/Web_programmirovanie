<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Healthcare</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
 
</head>
<body>
    <!-- 🌍 ЛР10: Переключатели -->
    <div class="top-settings">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

    <div class="wrapper">
        <div class="admin-header">
            <a href="index.html" class="logo">HEALTCARE.</a>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <a href="index.html" class="back-link" data-i18n="admin-back-home">← На главную</a>
                <a href="catalog.html" class="back-link" data-i18n="admin-back-catalog">В каталог</a>
            </div>
        </div>
        
        <div class="admin-container">
            <h2 id="adminWelcome" style="font-family: 'Roboto', sans-serif; color: #1F2A4A; margin-bottom: 30px;" data-i18n="admin-title">Панель управления</h2>
            
            <div class="admin-section">
                <h3 data-i18n="admin-services">🛠️ Управление услугами</h3>
                <form id="serviceForm" class="admin-form-grid">
                    <input type="hidden" id="serviceId">
                    <div class="form-group"><label>Название <span class="required">*</span></label><input type="text" id="serviceName" required></div>
                    <div class="form-group"><label>Цена (BYN) <span class="required">*</span></label><input type="number" id="servicePrice" step="0.01" min="0" required></div>
                    <div class="form-group full-width"><label>Описание</label><textarea id="serviceDesc" rows="3" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; font-family:inherit;"></textarea></div>
                    <div class="form-group"><label>Категория</label>
                        <select id="serviceCategory" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
                            <option value="Consultation">Консультация</option>
                            <option value="Diagnostics">Diagnostics</option>
                            <option value="Treatment">Лечение</option>
                            <option value="Prevention">Профилактика</option>
                            <option value="Surgery">Хирургия</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Рейтинг (0-5)</label><input type="number" id="serviceRating" step="0.1" min="0" max="5" value="5.0"></div>
                    <div class="form-group full-width"><label>Путь к изображению</label><input type="text" id="serviceImage" placeholder="images/service.jpg"></div>
                    <div class="full-width"><button type="submit" class="btn-primary" style="max-width: 250px;" data-i18n="admin-save">💾 Сохранить услугу</button></div>
                </form>
                
                <table>
                    <thead><tr><th>ID</th><th>Название</th><th>Цена</th><th>Категория</th><th>Действия</th></tr></thead>
                    <tbody id="servicesTableBody"><tr><td colspan="5" style="text-align:center;">Загрузка...</td></tr></tbody>
                </table>
            </div>
            
            <div class="admin-section">
                <h3 data-i18n="admin-feedback">💬 Управление отзывами</h3>
                <div class="filter-row">
                    <div class="form-group"><label>Фильтр по услуге</label><select id="filterService" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;"><option value="">Все услуги</option></select></div>
                    <div class="form-group"><label>Фильтр по ID пользователя</label><input type="text" id="filterUser" placeholder="Например: 1" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;"></div>
                </div>
                <table>
                    <thead><tr><th>ID</th><th>Пользователь</th><th>Услуга</th><th>Отзыв</th><th>Действия</th></tr></thead>
                    <tbody id="feedbackTableBody"><tr><td colspan="5" style="text-align:center;">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
    <script src="translate.js"></script>
    <script>
        let currentLang = localStorage.getItem('lang') || 'ru';
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        function getTranslate(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18Obj[lang] && i18Obj[lang][key]) {
                    el.textContent = i18Obj[lang][key];
                }
            });
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }
        
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                document.getElementById('themeToggle').textContent = '☀️';
            } else {
                document.body.classList.remove('dark-theme');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            currentTheme = theme;
            localStorage.setItem('theme', theme);
        }
        
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('lang-btn')) getTranslate(e.target.dataset.lang);
        });
        
        document.getElementById('themeToggle').addEventListener('click', () => {
            applyTheme(currentTheme === 'light' ? 'dark' : 'light');
        });
        
        window.addEventListener('load', () => {
            getTranslate(currentLang);
            applyTheme(currentTheme);
        });
    </script>
</body>
</html>
