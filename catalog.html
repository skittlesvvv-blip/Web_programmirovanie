<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | Healthcare</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
   </head>
<body>
    <!-- 🌍 ЛР10: Переключатели -->
    <div class="top-settings">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

    <div class="wrapper">
        <div class="catalog-header">
            <a href="#" class="logo">HEALTCARE.</a>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <ul class="nav-list">
                    <li><a href="index.html" data-i18n="home">Home</a></li>
                    <li><a href="catalog.html" data-i18n="catalog">Catalog</a></li>
                    <li><a href="login.html" data-i18n="login">Login</a></li> 
                    <li><a href="register.html" data-i18n="register">Register</a></li>
                    <li><a href="feedback.html" data-i18n="feedback">Feedback</a></li>
                    <li><a href="cart.html" data-i18n="cart">Cart</a></li>
                    <li><a href="favorites.html" data-i18n="favorites">Favorites</a></li>
                    <li><a href="reviews.html" data-i18n="reviews-title">Reviews</a></li>
                </ul>
            </div>
        </div>
        
        <div class="catalog-controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск...">
            </div>
            <div class="sort-box">
                <select id="sortSelect">
                    <option value="">Сортировка: по умолчанию</option>
                    <option value="name-asc">По названию (А-Я)</option>
                    <option value="name-desc">По названию (Я-А)</option>
                    <option value="price-asc">По цене (возрастание)</option>
                    <option value="price-desc">По цене (убывание)</option>
                    <option value="rating-asc">По рейтингу (возрастание)</option>
                    <option value="rating-desc">По рейтингу (убывание)</option>
                </select>
            </div>
            <div class="category-box">
                <select id="categorySelect">
                    <option value="">Все категории</option>
                    <option value="Consultation">Консультации</option>
                    <option value="Diagnostics">Диагностика</option>
                    <option value="Treatment">Лечение</option>
                    <option value="Prevention">Профилактика</option>
                    <option value="Surgery">Хирургия</option>
                </select>
            </div>
            <div class="price-range-box">
                <input type="number" id="minPrice" placeholder="Цена от" min="0">
                <input type="number" id="maxPrice" placeholder="Цена до" min="0">
            </div>
            <button class="back-link" id="clearFilters" style="padding: 10px 15px;">Очистить</button>
        </div>
        
        <div class="catalog-container">
            <div id="catalogGrid" class="catalog-grid">
                <div class="loading">Загрузка товаров...</div>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>
    
    <script src="catalog.js"></script>
    <script src="translate.js"></script>
    <script>
        let currentLang = localStorage.getItem('lang') || 'ru';
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        function getTranslate(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18Obj[lang] && i18Obj[lang][key]) {
                    el.textContent = i18Obj[lang][key];
                }
            });
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }
        
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                document.getElementById('themeToggle').textContent = '☀️';
            } else {
                document.body.classList.remove('dark-theme');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            currentTheme = theme;
            localStorage.setItem('theme', theme);
        }
        
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('lang-btn')) getTranslate(e.target.dataset.lang);
        });
        
        document.getElementById('themeToggle').addEventListener('click', () => {
            applyTheme(currentTheme === 'light' ? 'dark' : 'light');
        });
        
        window.addEventListener('load', () => {
            getTranslate(currentLang);
            applyTheme(currentTheme);
        });
    
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const navList = document.querySelector('.nav-list');
        const getStartedBtn = document.getElementById('getStartedBtn');
        if (currentUser && getStartedBtn) getStartedBtn.style.display = 'none';
        
        if (navList) {
            const existingAuth = document.getElementById('userAuthBlock');
            if (existingAuth) existingAuth.remove();
            const existingAdmin = document.getElementById('adminLink');
            if (existingAdmin) existingAdmin.remove();

            if (currentUser) {
                const authBlock = document.createElement('li');
                authBlock.id = 'userAuthBlock';
                authBlock.style.display = 'flex';
                authBlock.style.alignItems = 'center';
                authBlock.style.gap = '15px';
                
                authBlock.innerHTML = `
                    <span style="color: #1F2A4A; font-weight: 500;">👤 ${currentUser.firstName}</span>
                    <button id="logoutBtn" style="background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 14px;" data-i18n="logout">Выйти</button>
                `;
                
                navList.appendChild(authBlock);

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    localStorage.removeItem('currentUser');
                    location.reload();
                });

                if (currentUser.role === 'admin') {
                    const adminLink = document.createElement('li');
                    adminLink.id = 'adminLink';
                    adminLink.innerHTML = '<a href="admin.html" style="color: #dc3545; font-weight: 600; font-size: 12px; border: 1px solid #dc3545; padding: 3px 8px; border-radius: 4px; text-decoration: none;">⚙️Админ</a>';
                    navList.appendChild(adminLink);
                }
            } else {
                const loginBlock = document.createElement('li');
                loginBlock.id = 'userAuthBlock';
                loginBlock.innerHTML = '<a href="login.html" style="color: #4b97ef; font-weight: 500;" data-i18n="login">Login</a>';
                navList.appendChild(loginBlock);
            }
        }
    </script>
</body>
</html>
