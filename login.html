<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | Healthcare</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">

   </head>
<body>
    <!-- 🌍 ЛР10: Переключатели -->
    <div class="top-settings">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

    <div class="wrapper">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 30px; font-family: 'Roboto', sans-serif; color: #1F2A4A;" data-i18n="login-title">Вход в аккаунт</h2>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="loginIdentifier" data-i18n="login-identifier">Email или Телефон <span class="required">*</span></label>
                    <input type="text" id="loginIdentifier" required placeholder="example@mail.ru или +375...">
                    <div class="error-message"></div>
                </div>
                <div class="form-group">
                    <label for="loginPassword" data-i18n="login-password">Пароль <span class="required">*</span></label>
                    <input type="password" id="loginPassword" required>
                    <div class="error-message"></div>
                </div>
                
                <button type="submit" id="loginBtn" class="btn-primary" disabled data-i18n="login-submit">Войти</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #5A6A7F;">
                <span data-i18n="login-no-account">Нет аккаунта?</span> <a href="register.html" style="color: #4b97ef; font-weight: 500;" data-i18n="login-register-link">Зарегистрироваться</a>
            </p>

            <div style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-radius: 8px; font-size: 13px; color: #5A6A7F; border: 1px solid #e0e0e0;">
                <strong style="color: #1F2A4A;">🔑 Тестовые аккаунты:</strong><br>
                <div style="margin-top: 8px;">
                    <strong>Администратор:</strong> admin@healthcare.com / Admin1@2026<br>
                    <strong>Клиент:</strong> client@healthcare.com / Client1@2026
                </div>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
    <script src="translate.js"></script>
    <script>
        // 🌍 ЛР10: Перевод и тема
        let currentLang = localStorage.getItem('lang') || 'ru';
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        function getTranslate(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18Obj[lang] && i18Obj[lang][key]) {
                    el.textContent = i18Obj[lang][key];
                }
            });
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }
        
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                document.getElementById('themeToggle').textContent = '☀️';
            } else {
                document.body.classList.remove('dark-theme');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            currentTheme = theme;
            localStorage.setItem('theme', theme);
        }
        
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('lang-btn')) getTranslate(e.target.dataset.lang);
        });
        
        document.getElementById('themeToggle').addEventListener('click', () => {
            applyTheme(currentTheme === 'light' ? 'dark' : 'light');
        });
        
        window.addEventListener('load', () => {
            getTranslate(currentLang);
            applyTheme(currentTheme);
        });
    </script>
</body>
</html>
