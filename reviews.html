<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы | Healthcare</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
</head>
<body>
    <!-- 🌍 ЛР10: Переключатели -->
    <div class="top-settings">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn active" data-lang="ru">RU</button>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

    <div class="wrapper">
        <div class="reviews-header">
            <a href="index.html" class="logo">HEALTCARE.</a>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <a href="feedback.html" class="back-link" data-i18n="reviews-write">✍️ Оставить отзыв</a>
                <a href="catalog.html" class="back-link" data-i18n="reviews-back-catalog">← В каталог</a>
                <a href="index.html" class="back-link" data-i18n="reviews-back-home">← На главную</a>
            </div>
        </div>
        
        <div class="reviews-container">
            <h2 style="font-family: 'Roboto', sans-serif; color: #1F2A4A; margin-bottom: 10px;" data-i18n="reviews-title">💬 Отзывы наших клиентов</h2>
            <p style="color: #5A6A7F; margin-bottom: 20px;" data-i18n="reviews-subtitle">Узнайте, что говорят о наших услугах</p>
            <div id="reviewsGrid" class="reviews-grid">
                <div class="loading">Загрузка отзывов...</div>
            </div>
        </div>
    </div>
    
    <script src="translate.js"></script>
    <script>
        const API_URL = 'http://localhost:3001';
        
        document.addEventListener('DOMContentLoaded', loadReviews);
        
        async function loadReviews() {
            const grid = document.getElementById('reviewsGrid');
            
            try {
                const [feedbackRes, usersRes, servicesRes] = await Promise.all([
                    fetch(`${API_URL}/feedback`),
                    fetch(`${API_URL}/users`),
                    fetch(`${API_URL}/services`)
                ]);
                
                const feedbacks = await feedbackRes.json();
                const users = await usersRes.json();
                const services = await servicesRes.json();
                
                if (feedbacks.length === 0) {
                    grid.innerHTML = '<div class="no-reviews">💬 Пока нет отзывов. <a href="feedback.html" style="color: #4b97ef;">Оставьте первый!</a></div>';
                    return;
                }
                
                feedbacks.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                grid.innerHTML = feedbacks.map(f => {
                    const user = users.find(u => u.id === f.userId);
                    const service = services.find(s => s.id === f.serviceId);
                    const userName = user ? `${user.firstName} ${user.lastName || ''}` : 'Гость';
                    const serviceName = service ? service.name : 'Услуга удалена';
                    const date = new Date(f.date).toLocaleDateString('ru-RU', { 
                        year: 'numeric', month: 'long', day: 'numeric' 
                    });
                    
                    return `
                        <div class="review-card">
                            <div class="review-header">
                                <div class="review-user">👤 ${escapeHtml(userName)}</div>
                                <div class="review-service">${escapeHtml(serviceName)}</div>
                            </div>
                            <div class="review-text">${escapeHtml(f.text)}</div>
                            <div class="review-date">📅 ${date}</div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Ошибка загрузки отзывов:', error);
                grid.innerHTML = '<div class="no-reviews">❌ Ошибка загрузки отзывов</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // 🌍 ЛР10: Перевод и тема
        let currentLang = localStorage.getItem('lang') || 'ru';
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        function getTranslate(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18Obj[lang] && i18Obj[lang][key]) {
                    el.textContent = i18Obj[lang][key];
                }
            });
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }
        
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                document.getElementById('themeToggle').textContent = '☀️';
            } else {
                document.body.classList.remove('dark-theme');
                document.getElementById('themeToggle').textContent = '🌙';
            }
            currentTheme = theme;
            localStorage.setItem('theme', theme);
        }
        
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('lang-btn')) getTranslate(e.target.dataset.lang);
        });
        
        document.getElementById('themeToggle').addEventListener('click', () => {
            applyTheme(currentTheme === 'light' ? 'dark' : 'light');
        });
        
        window.addEventListener('load', () => {
            getTranslate(currentLang);
            applyTheme(currentTheme);
        });
    </script>
</body>
</html>
